<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelayCraft</title>
    <style>
        /*
         * Rounded corners (macOS / Windows / Linux transparent WebView):
         * .splash-card keeps border-radius: 12px + overflow: hidden so opaque content
         * clips to the same round rect; body stays transparent outside — do not remove.
         */
        :root {
            --bg: #09090b;
            --border: rgba(255, 255, 255, 0.05);
            --text: #f4f4f5;
            --muted: rgba(255, 255, 255, 0.38);
            --line: rgba(255, 255, 255, 0.08);
        }

        .theme-light {
            --bg: #fafafa;
            --border: rgba(0, 0, 0, 0.07);
            --text: #18181b;
            --muted: rgba(0, 0, 0, 0.42);
            --line: rgba(0, 0, 0, 0.08);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            cursor: default;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .splash-card {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 0 24px;
            max-width: 280px;
        }

        .logo-box {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-box svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .wordmark {
            text-align: center;
        }

        .app-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--text);
        }

        .slogan {
            margin-top: 5px;
            font-size: 11px;
            font-weight: 450;
            letter-spacing: 0.01em;
            line-height: 1.45;
            color: var(--muted);
        }

        /* Static rule — no animation (cold + minimal GPU) */
        .loader-line {
            width: 100%;
            height: 1px;
            margin-top: 10px;
            background: var(--line);
            border-radius: 0;
        }

        .status-line {
            font-size: 10px;
            font-weight: 450;
            letter-spacing: 0.02em;
            color: var(--muted);
            margin-top: 8px;
        }

        .footer {
            position: absolute;
            bottom: 14px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .footer-line {
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            color: var(--muted);
            opacity: 0.85;
        }
    </style>
    <script>
        (() => {
            try {
                const mode = localStorage.getItem('themeMode');
                if (mode === 'light') document.documentElement.classList.add('theme-light');
            } catch (e) {
                console.warn('Theme sync failed', e);
            }
        })();

        var _splashShown = false;
        function showWindowWhenReady() {
            if (_splashShown) return;
            _splashShown = true;
            requestAnimationFrame(() => {
                setTimeout(() => {
                    try {
                        if (window.__TAURI__) window.__TAURI__.window.getCurrentWindow().show();
                    } catch (e) {
                        console.warn('Failed to show splash window:', e);
                    }
                }, 0);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const statusEl = document.getElementById('status');
            const sloganEl = document.getElementById('slogan');

            const isZh = navigator.language.startsWith('zh');
            if (statusEl) statusEl.textContent = isZh ? '正在启动' : 'Starting';
            if (sloganEl) sloganEl.textContent = isZh ? 'AI 原生网络流量调试' : 'AI-native traffic debugging';

            if (window.__TAURI__) {
                const { listen } = window.__TAURI__.event;
                listen('init-status', (event) => {
                    if (statusEl) statusEl.textContent = event.payload;
                });
            } else {
                console.warn('Tauri API not found. withGlobalTauri might be disabled.');
            }

            showWindowWhenReady();
        });
    </script>
</head>

<body>
    <div class="splash-card">
        <div class="content">
            <div class="logo-box" aria-hidden="true">
                <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="512" height="512" rx="100" fill="#4F46E5" />
                    <g transform="translate(111, 96)">
                        <rect x="0" y="70" width="50" height="180" rx="25" fill="white" fill-opacity="0.95" />
                        <rect x="80" y="30" width="50" height="260" rx="25" fill="white" />
                        <rect x="160" y="0" width="50" height="320" rx="25" fill="white" />
                        <rect x="240" y="60" width="50" height="200" rx="25" fill="white" fill-opacity="0.95" />
                        <circle cx="265" cy="296" r="14" fill="white" />
                    </g>
                </svg>
            </div>

            <div class="wordmark">
                <div class="app-name">RelayCraft</div>
                <p id="slogan" class="slogan">AI-native traffic debugging</p>
                <div class="loader-line" aria-hidden="true"></div>
                <div id="status" class="status-line">Starting</div>
            </div>
        </div>

        <div class="footer">
            <div class="footer-line">v1.1.2 · © 2026 RelayCraft Team</div>
        </div>
    </div>
</body>

</html>
