name: 🐛 Bug Report
description: Report a bug or unexpected behavior | 报告问题或意外行为
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        感谢您填写错误报告！

        Before submitting, please check that this issue hasn't been reported already.
        提交前请确认此问题尚未被其他人报告。

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist | 提交前检查
      options:
        - label: I searched existing issues and did not find a duplicate. | 我已搜索现有 Issue，未发现重复项。
          required: true
        - label: I can provide steps to reproduce if needed. | 如有需要我可以补充复现步骤。

  - type: input
    id: version
    attributes:
      label: RelayCraft Version | 版本
      description: Which version are you using? You can find it in the app's About page.
      placeholder: e.g. 1.0.0-rc1

  - type: dropdown
    id: platform
    attributes:
      label: Operating System | 操作系统
      options:
        - macOS
        - Windows
        - Linux

  - type: textarea
    id: what-happened
    attributes:
      label: What happened? | 发生了什么？
      description: A clear and concise description. | 请用清晰简洁的方式描述问题。
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce | 复现步骤
      description: How can we reproduce this issue? | 如何复现此问题？
      placeholder: |
        1. Open RelayCraft
        2. Go to '...'
        3. Click on '...'
        4. See error

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior | 预期行为
      description: What did you expect to happen? | 您期望发生什么？

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior | 实际行为
      description: What actually happened? | 实际发生了什么？

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots | 错误日志 / 截图
      description: |
        Paste any relevant logs or attach screenshots.
        粘贴相关日志或附上截图。
        Please redact sensitive data (tokens, cookies, Authorization headers, internal domains/IPs).
        请对敏感信息脱敏（token、cookie、Authorization、内网域名/IP 等）。
        You can find logs at: macOS `~/Library/Logs/com.relaycraft.app/`, Windows `%APPDATA%\com.relaycraft.app\logs\`
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Anything else? | 其他补充
      description: If you're not sure where to put something, put it here. | 不确定写哪就写这里。
