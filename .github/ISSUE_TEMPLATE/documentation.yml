name: 📚 Documentation Issue
description: Report missing, incorrect, or unclear documentation | 报告文档问题
title: "[Docs] "
labels: ["documentation", "needs-triage"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist | 提交前检查
      options:
        - label: I searched existing issues and did not find a duplicate doc issue. | 我已搜索现有 Issue，未发现重复文档问题。
          required: true

  - type: textarea
    id: description
    attributes:
      label: What is missing or incorrect? | 缺少或不正确的内容是什么？
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Documentation location | 文档位置
      placeholder: e.g. README, wiki page URL, in-app help text

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement | 改进建议

  - type: textarea
    id: extra
    attributes:
      label: Anything else? | 其他补充
      description: Screenshots, links, or anything else. | 截图、链接等，不确定写哪就写这里。
