name: ✨ Feature Request
description: Suggest a new feature or improvement | 建议新功能或改进
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
        感谢您的功能建议！

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission Checklist | 提交前检查
      options:
        - label: I searched existing issues and discussions and did not find a duplicate. | 我已搜索 Issue 和 Discussions，未发现重复建议。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case | 问题 / 使用场景
      description: What problem does this feature solve? | 此功能解决了什么问题？
      placeholder: I'm frustrated when... / 当我...时感到不方便...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution | 建议的解决方案
      description: How would you like this to work? | 您希望如何实现？

  - type: dropdown
    id: category
    attributes:
      label: Feature Category | 功能分类
      options:
        - Traffic Inspection | 流量查看
        - Rules & Rewriting | 规则与重写
        - AI Analysis | AI 分析
        - Proxy Configuration | 代理配置
        - UI / UX
        - Performance | 性能
        - Plugin System | 插件系统
        - Other | 其他

  - type: textarea
    id: extra
    attributes:
      label: Anything else? | 其他补充
      description: Priority, screenshots, mockups, constraints, or anything else. | 优先级、截图、约束条件等，不确定写哪就写这里。
